name: Linux Clang

on:
  push:
    branches: ["main", "feature/*"]
    paths-ignore: ["**/*.md", "docs/**"]
  pull_request:
    branches: main
    paths-ignore: ["**/*.md", "docs/**"]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test (${{ matrix.tls.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug]
        clang: [20]
        std: [23]
        tls:
          - name: No TLS
            cmake_arg: ""
            build_dir: build-no-tls
            use_vcpkg: false
          - name: wolfSSL
            cmake_arg: "-DAERO_TLS_BACKEND=wolfssl -DAERO_BUILD_NETWORK_TLS_TESTS=ON"
            build_dir: build-wolfssl
            use_vcpkg: true

    env:
      CC: clang-${{ matrix.clang }}
      CXX: clang++-${{ matrix.clang }}
      VCPKG_DEFAULT_TRIPLET: x64-linux

    steps:
      - uses: actions/checkout@v4

      - name: Setup Clang
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm
          llvm-version: ${{ matrix.clang }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libc++-${{ matrix.clang }}-dev libc++abi-${{ matrix.clang }}-dev libunwind-${{ matrix.clang }}-dev

      - name: Setup vcpkg
        if: matrix.tls.use_vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 29f10019c26142cc4689b53b8c91da519db09e5c

      - name: Install wolfSSL (vcpkg)
        if: matrix.tls.use_vcpkg
        run: |
          "$VCPKG_ROOT/vcpkg" install "wolfssl[asio]" --triplet "${VCPKG_DEFAULT_TRIPLET}"

      - name: Configure CMake
        shell: bash
        run: |
          vcpkg_cmake_args=()
          if [[ "${{ matrix.tls.use_vcpkg }}" == "true" ]]; then
            vcpkg_cmake_args+=("-DCMAKE_TOOLCHAIN_FILE=${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake")
            vcpkg_cmake_args+=("-DVCPKG_TARGET_TRIPLET=${VCPKG_DEFAULT_TRIPLET}")
          fi

          cmake -B "${{ github.workspace }}/${{ matrix.tls.build_dir }}" \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_STANDARD=${{ matrix.std }} \
            -DCMAKE_C_COMPILER=${{ env.CC }} \
            -DCMAKE_CXX_COMPILER=${{ env.CXX }} \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++ -lc++abi" \
            ${{ matrix.tls.cmake_arg }} \
            "${vcpkg_cmake_args[@]}"

      - name: Build
        run: cmake --build "${{ matrix.tls.build_dir }}" --parallel

      - name: Test
        working-directory: "${{ matrix.tls.build_dir }}"
        run: ctest --output-on-failure --parallel
