name: MacOS AppleClang

on:
  push:
    branches: ["main", "feature/*"]
    paths-ignore: ["**/*.md", "docs/**"]
  pull_request:
    branches: ["main"]
    paths-ignore: ["**/*.md", "docs/**"]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test (${{ matrix.tls.name }})
    runs-on: macos-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug]
        std: [23]
        tls:
          - name: No TLS
            cmake_arg: ""
            build_dir: build-no-tls
            use_vcpkg: false
          - name: wolfSSL
            cmake_arg: "-DAERO_TLS_BACKEND=wolfssl -DAERO_BUILD_NETWORK_TLS_TESTS=ON"
            build_dir: build-wolfssl
            use_vcpkg: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain info
        run: |
          xcodebuild -version
          which clang
          which clang++
          clang --version
          xcrun clang --version
          xcrun clang++ --version
          
      - name: Detect vcpkg triplet
        if: matrix.tls.use_vcpkg
        shell: bash
        run: |
          if [[ "$(uname -m)" == "arm64" ]]; then
            echo "VCPKG_DEFAULT_TRIPLET=arm64-osx" >> "$GITHUB_ENV"
          else
            echo "VCPKG_DEFAULT_TRIPLET=x64-osx" >> "$GITHUB_ENV"
          fi

      - name: Setup vcpkg
        if: matrix.tls.use_vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 29f10019c26142cc4689b53b8c91da519db09e5c

      - name: Install wolfSSL (vcpkg)
        if: matrix.tls.use_vcpkg
        run: |
          "$VCPKG_ROOT/vcpkg" install "wolfssl[asio]" --triplet "${VCPKG_DEFAULT_TRIPLET}"

      - name: Configure CMake
        shell: bash
        run: |
          vcpkg_cmake_args=()
          if [[ "${{ matrix.tls.use_vcpkg }}" == "true" ]]; then
            vcpkg_cmake_args+=("-DCMAKE_TOOLCHAIN_FILE=${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake")
            vcpkg_cmake_args+=("-DVCPKG_TARGET_TRIPLET=${VCPKG_DEFAULT_TRIPLET}")
          fi

          cmake -B "${{ github.workspace }}/${{ matrix.tls.build_dir }}" \
            -DCMAKE_CXX_STANDARD=${{ matrix.std }} \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON \
            -DCMAKE_CXX_EXTENSIONS=OFF \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            ${{ matrix.tls.cmake_arg }} \
            "${vcpkg_cmake_args[@]}"

      - name: Build
        run: cmake --build "${{ github.workspace }}/${{ matrix.tls.build_dir }}" --config ${{ matrix.build_type }} --parallel

      - name: Test
        working-directory: ${{ github.workspace }}/${{ matrix.tls.build_dir }}
        run: ctest --output-on-failure -C ${{ matrix.build_type }}
